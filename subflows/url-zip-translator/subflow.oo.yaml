title: "%zip%"
description: "%url-zip-translator-description%"
inputs_def:
  - handle: url
    description: "%url-zip-translator-url%"
    json_schema:
      type: string
      format: uri
    nullable: false
    executor_name: nodejs
  - handle: target_lang
    description: "%url-zip-translator-target-lang%"
    json_schema:
      enum:
        - CHS
        - CHT
        - CSY
        - NLD
        - ENG
        - FRA
        - DEU
        - HUN
        - ITA
        - JPN
        - KOR
        - POL
        - PTB
        - ROM
        - RUS
        - ESP
        - TRK
        - UKR
        - VIN
        - ARA
        - CNR
        - SRP
        - HRV
        - THA
        - IND
        - FIL
      ui:options:
        labels:
          - Chinese Simplified
          - Chinese Traditional
          - Czech
          - Dutch
          - English
          - French
          - German
          - Hungarian
          - Italian
          - Japanese
          - Korean
          - Polish
          - Portuguese Brazilian
          - Romanian
          - Russian
          - Spanish
          - Turkish
          - Ukrainian
          - Vietnamese
          - Arabic
          - Montenegrin
          - Serbian
          - Croatian
          - Thai
          - Indonesian
          - Filipino
    value: CHS
    nullable: false
    executor_name: python
  - handle: wait_timeout
    description: "%url-zip-translator-wait-timeout%"
    json_schema:
      type: number
    value: 2400
    nullable: true
    executor_name: python
  - handle: colorize
    description: "%url-zip-translator-colorize%"
    json_schema:
      type: boolean
    nullable: true
    executor_name: python
  - handle: directory
    description: "%url-zip-translator-directory%"
    json_schema:
      type: string
    nullable: true
    executor_name: python
  - handle: file
    description: "%url-zip-translator-file%"
    json_schema:
      type: string
    nullable: true
    executor_name: python
outputs_def:
  - handle: session_id
    description: "%url-zip-translator-session-id%"
    json_schema:
      type: string
    nullable: false
    executor_name: python
  - handle: result_zip_url
    description: "%url-zip-translator-result-zip-url%"
    json_schema:
      type: string
      format: uri
    nullable: true
    executor_name: python
  - handle: result_zip_raw_url
    description: "%url-zip-translator-result-zip-raw-url%"
    json_schema:
      type: string
      format: uri
    nullable: true
    executor_name: python
  - handle: result_zip_object_key
    description: "%url-zip-translator-result-zip-object-key%"
    json_schema:
      type: string
    nullable: true
    executor_name: python
  - handle: total_pages
    description: "%url-zip-translator-total-pages%"
    json_schema:
      type: integer
    nullable: false
    executor_name: python
nodes:
  - node_id: upload-to-cloud#1
    title: "%1%"
    inputs_from:
      - handle: file
        from_flow:
          []
        from_node:
          - node_id: check-zip-format#2
            output_handle: file_zip_path
    task: alicloud-oss::upload-to-cloud
    progress_weight: 2
  - node_id: manga-zip-translate#1
    title: "%manga-zip-translate-1%"
    inputs_from:
      - handle: zip_url
        from_node:
          - node_id: upload-to-cloud#1
            output_handle: remote_url
          - node_id: check-zip-format#2
            output_handle: file_zip_url
      - handle: target_lang
        value: CHS
        from_flow:
          - input_handle: target_lang
      - handle: wait_timeout
        value: 1200
        from_flow:
          - input_handle: wait_timeout
      - handle: poll_interval
        value: 5
      - handle: max_retries
        value: 3
      - handle: retry_delay
        value: 2
      - handle: colorize
        from_flow:
          - input_handle: colorize
      - handle: directory
        from_flow:
          - input_handle: directory
      - handle: file
        from_flow:
          - input_handle: file
    task: self::manga-zip-translate
    progress_weight: 7
  - node_id: check-zip-format#2
    title: "%check-zip-format-2%"
    inputs_from:
      - handle: path
        from_flow:
          - input_handle: url
    task: self::check-zip-format
    progress_weight: 1
outputs_from:
  - handle: result_zip_url
    from_node:
      - node_id: manga-zip-translate#1
        output_handle: result_zip_url
  - handle: result_zip_raw_url
    from_node:
      - node_id: manga-zip-translate#1
        output_handle: result_zip_raw_url
  - handle: result_zip_object_key
    from_node:
      - node_id: manga-zip-translate#1
        output_handle: result_zip_object_key
  - handle: total_pages
    from_node:
      - node_id: manga-zip-translate#1
        output_handle: total_pages
  - handle: session_id
    from_node:
      - node_id: manga-zip-translate#1
        output_handle: session_id
