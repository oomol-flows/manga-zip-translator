inputs_def:
  - handle: zip_url
    description: "%publicly-accessible-url-of-the-manga-zip-file-to-translate-must%"
    json_schema:
      type: string
      format: uri
    nullable: false

  - handle: target_lang
    description: "%target-language-for-manga-text-translation-supports-26-languages%"
    json_schema:
      enum:
        - CHS
        - CHT
        - CSY
        - NLD
        - ENG
        - FRA
        - DEU
        - HUN
        - ITA
        - JPN
        - KOR
        - POL
        - PTB
        - ROM
        - RUS
        - ESP
        - TRK
        - UKR
        - VIN
        - ARA
        - CNR
        - SRP
        - HRV
        - THA
        - IND
        - FIL
      ui:options:
        labels:
          - Chinese Simplified
          - Chinese Traditional
          - Czech
          - Dutch
          - English
          - French
          - German
          - Hungarian
          - Italian
          - Japanese
          - Korean
          - Polish
          - Portuguese Brazilian
          - Romanian
          - Russian
          - Spanish
          - Turkish
          - Ukrainian
          - Vietnamese
          - Arabic
          - Montenegrin
          - Serbian
          - Croatian
          - Thai
          - Indonesian
          - Filipino
    value: CHS
    nullable: false

  - group: Colorization Options
    collapsed: false

  - handle: colorize
    description: "%enable-colorization-for-manga-images%"
    json_schema:
      type: boolean
    value: false
    nullable: true

  - group: Output Options
    collapsed: false

  - handle: directory
    description: "%optional-upload-directory-for-translated-zip-file%"
    json_schema:
      type: string
    value:
    nullable: true

  - handle: file
    description: "%optional-output-filename-for-translated-zip-file%"
    json_schema:
      type: string
    value:
    nullable: true

  - group: Polling Options
    collapsed: false

  - handle: wait_timeout
    description: "%timeout-in-seconds-for-translation-task-default-1200s-20-minutes%"
    json_schema:
      type: number
    value: 2400
    nullable: true

  - handle: poll_interval
    description: "%interval-in-seconds-between-status-check-requests-during-polling%"
    json_schema:
      type: number
    value: 5
    nullable: true

  - handle: max_retries
    description: "%maximum-number-of-retry-attempts-for-failed-http-requests-applie%"
    json_schema:
      type: number
    value: 3
    nullable: true

  - handle: retry_delay
    description: "%base-delay-in-seconds-between-retry-attempts-actual-delay-increa%"
    json_schema:
      type: number
    value: 2
    nullable: true

outputs_def:
  - handle: session_id
    description: "%session-id-for-the-translation-task%"
    json_schema:
      type: string
    nullable: false

  - handle: status
    description: "%status-of-the-translation-task%"
    json_schema:
      type: string
    nullable: false

  - handle: result_zip_url
    description: "%download-url-of-the-translated-manga-zip-file%"
    json_schema:
      type: string
      format: uri
    nullable: false

  - handle: result_zip_raw_url
    description: "%raw-download-url-of-the-translated-manga-zip-file%"
    json_schema:
      type: string
      format: uri
    nullable: true

  - handle: result_zip_object_key
    description: "%object-storage-key-for-the-translated-zip-file%"
    json_schema:
      type: string
    nullable: true

  - handle: translated_images
    description: "%number-of-images-successfully-translated%"
    json_schema:
      type: integer
    nullable: false

  - handle: total_pages
    description: "%total-number-of-pages-in-the-manga-zip%"
    json_schema:
      type: integer
    nullable: false

  - handle: translated_pages
    description: "%number-of-pages-successfully-translated%"
    json_schema:
      type: integer
    nullable: false

executor:
  name: python
  options:
    entry: __init__.py
    spawn: false

title: "%manga-zip-translate%"
icon: ":carbon:document:"
description: "%manga-zip-translate-description%"
private: true
