title: "%test-manga-zip-translate%"
description: "%test-flow-for-manga-zip-translate-task%"
nodes:
  - node_id: upload-to-cloud#1
    title: "上传文件到云端 #1"
    inputs_from:
      - handle: file
    task: alicloud-oss::upload-to-cloud
  - node_id: +python#1
    title: "Python #1"
    icon: ":logos:python:"
    task:
      ui:
        default_width: 450
      inputs_def:
        - handle: remote_url
          json_schema:
            type: string
            title: Presigned URL
          nullable: false
          description: Presigned URL for accessing the uploaded file (valid for 24 hours)
      outputs_def:
        []
      executor:
        name: python
        options:
          entry: scriptlets/+scriptlet#1.py
    inputs_from:
      - handle: remote_url
        from_node:
          - node_id: upload-to-cloud#1
            output_handle: remote_url
